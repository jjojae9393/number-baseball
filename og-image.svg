<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="grass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42a862"/>
      <stop offset="100%" stop-color="#2d8a4e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#grass)"/>
  <!-- Grass lines -->
  <g opacity="0.06">
    <line x1="0" y1="30" x2="1200" y2="30" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="90" x2="1200" y2="90" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="270" x2="1200" y2="270" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="330" x2="1200" y2="330" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="390" x2="1200" y2="390" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="450" x2="1200" y2="450" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="480" x2="1200" y2="480" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="510" x2="1200" y2="510" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="570" x2="1200" y2="570" stroke="#000" stroke-width="2"/>
    <line x1="0" y1="600" x2="1200" y2="600" stroke="#000" stroke-width="2"/>
  </g>

  <!-- Card -->
  <rect x="320" y="100" width="560" height="430" rx="32" fill="#c4a265"/>
  <rect x="320" y="96" width="560" height="430" rx="32" fill="#fef9ef" stroke="#c4a265" stroke-width="5"/>

  <!-- Baseball -->
  <circle cx="600" cy="200" r="50" fill="#f5f0e1" stroke="#c4a265" stroke-width="2"/>
  <path d="M580 160c-5 10-7 22-7 40s2 30 7 40" fill="none" stroke="#d63031" stroke-width="3" stroke-linecap="round"/>
  <path d="M620 160c5 10 7 22 7 40s-2 30-7 40" fill="none" stroke="#d63031" stroke-width="3" stroke-linecap="round"/>

  <!-- Title -->
  <text x="600" y="330" text-anchor="middle" font-family="sans-serif" font-size="64" font-weight="900" fill="#3d2c1e">숫자야구</text>

  <!-- Subtitle -->
  <text x="600" y="380" text-anchor="middle" font-family="sans-serif" font-size="24" fill="#8b7355">실시간 1:1 대전 숫자 추리 게임</text>

  <!-- Badge -->
  <rect x="460" y="420" width="280" height="44" rx="22" fill="#d63031"/>
  <text x="600" y="449" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="700" fill="#fff">3스트라이크를 먼저 맞혀라!</text>
</svg>
